<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cintillo - Cleveland Horizons</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
.cintillo-wrap {
  width: 100%;
  font-family: 'Nunito', sans-serif;
  box-sizing: border-box;
  background: #fff;
}
.cintillo-wrap * { box-sizing: border-box; margin: 0; padding: 0; }


/* ── ICON GRID ── */
.cintillo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.cintillo-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cintillo-icon-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 5px 4px;
  width: 100%;
  cursor: default;
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cintillo-icon-pill:hover {
  transform: translateY(-5px);
}

.cintillo-icon-pill svg {
  width: 28px;
  height: 28px;
  transition: filter 0.28s ease;
}
.cintillo-icon-pill:hover svg {
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.22));
}

.cintillo-icon-name {
  font-family: 'Nunito', sans-serif;
  font-size: 0.52rem;
  font-weight: 900;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  white-space: nowrap;
  color: #2A7F9E;
  transition: letter-spacing 0.28s ease;
}
.cintillo-icon-pill:hover .cintillo-icon-name {
  letter-spacing: 0.14em;
}

/* ── BOTTOM STRIPE ── */
.cintillo-stripe {
  height: 7px;
  width: 100%;
  background: #1F6F9B;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .cintillo-header { gap: 8px; padding: 5px 6px; }
  .cintillo-title { font-size: 0.5rem; }
  .cintillo-subtitle { font-size: 0.42rem; }
  .cintillo-icon-pill svg { width: 22px; height: 22px; }
  .cintillo-icon-name { font-size: 0.44rem; letter-spacing: 0.06em; }
  .cintillo-icon-pill { padding: 4px 2px; gap: 2px; }
}
</style>
</head>
<body>

<div class="cintillo-wrap">

  <!-- Icons -->
  <div class="cintillo-grid">

    <div class="cintillo-col">
      <div class="cintillo-icon-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2A7F9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="cintillo-icon-name">Reading</span>
      </div>
    </div>

    <div class="cintillo-col">
      <div class="cintillo-icon-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2A7F9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
          <path d="m15 5 4 4"/>
        </svg>
        <span class="cintillo-icon-name">Writing</span>
      </div>
    </div>

    <div class="cintillo-col">
      <div class="cintillo-icon-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2A7F9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <path d="M7 9h10"/>
          <path d="M7 13h6"/>
        </svg>
        <span class="cintillo-icon-name">Grammar</span>
      </div>
    </div>

    <div class="cintillo-col">
      <div class="cintillo-icon-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2A7F9E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="cintillo-icon-name">Speaking</span>
      </div>
    </div>

  </div>

  <!-- Bottom stripe -->
  <div class="cintillo-stripe"></div>

</div>

</body>
</html>
